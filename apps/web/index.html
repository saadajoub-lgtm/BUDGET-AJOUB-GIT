<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FFFFFF" />
    <meta name="description" content="Suivi budget familial — Budget Famille Ajoub" />
    <link rel="manifest" href="/manifest.webmanifest?v=2" />
    <link rel="icon" type="image/png" href="/favicon.png?v=2" sizes="64x64" />
    <link rel="icon" type="image/png" href="/icon-192.png?v=2" sizes="192x192" />
    <link rel="icon" type="image/png" href="/icon-512.png?v=2" sizes="512x512" />
    <link rel="apple-touch-icon" href="/app-icon.png?v=2" />
    <title>Budget Famille Ajoub</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        try {
          var p = String(location.protocol || "");
          if (p === "content:" || p === "file:") {
            var el = document.getElementById("root");
            if (el) {
              el.innerHTML =
                '<div style="padding:24px;font-family:system-ui,sans-serif;line-height:1.55;max-width:28rem;margin:0 auto;color:#111">' +
                "<p><strong>Ouverture incorrecte</strong></p>" +
                "<p style=\"margin-top:12px;font-size:15px;color:#333\">Vous regardez probablement une page HTML enregistrée ou reçue (barre d’adresse en <code>content://</code> ou <code>file://</code>). Les scripts de l’application ne peuvent pas se charger dans ce mode : l’écran reste blanc.</p>" +
                "<p style=\"margin-top:12px;font-size:15px;color:#333\">Ouvrez l’application <strong>Budget Famille Ajoub</strong> via <strong>l’icône du lanceur</strong> (pas depuis Fichiers / WhatsApp).</p>" +
                '<p style="margin-top:12px;font-size:15px"><a href="https://budget-famille-ajoub.web.app">Ouvrir le site en ligne</a></p>' +
                "</div>";
            }
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
