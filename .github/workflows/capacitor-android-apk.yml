# APK Android (Capacitor) sans Expo : build dans le cloud GitHub Actions.
# Pas d'action android-actions/setup-android (evite Node 20 + versions figees sur de vieux runs).
# Récupération : Actions > run terminé > Artifacts ; si l'option Release est cochée : Releases > lien direct app-debug.apk

name: Capacitor Android APK (debug)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publier_release_github:
        description: "Créer une Release GitHub avec l'APK (lien de téléchargement public)"
        type: boolean
        default: true

concurrency:
  group: capacitor-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-debug-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      # SDK preinstalle sur l'image GitHub Actions (ubuntu-22.04).
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # sdkmanager exige JDK 17+ ; sans cela le runner utilise souvent Java 11.
      - name: JDK 21 (sdkmanager + Gradle)
        id: setup-jdk
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Verifier JDK
        run: |
          echo "JAVA_HOME=${JAVA_HOME}"
          java -version
          javac -version

      - name: Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      # SDK Android : uniquement bash + sdkmanager (aucune action JS tierce "setup-android").
      - name: Android SDK (platform-tools + plateforme 35)
        env:
          JAVA_HOME: ${{ steps.setup-jdk.outputs.path }}
        run: |
          set -euxo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT}"
          test -d "$SDK_ROOT"

          SDKM=""
          if [[ -x "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]]; then
            SDKM="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          else
            SDKM="$(find "$SDK_ROOT/cmdline-tools" -type f -path '*/bin/sdkmanager' 2>/dev/null | head -1 || true)"
          fi
          if [[ -z "$SDKM" || ! -x "$SDKM" ]]; then
            echo "sdkmanager introuvable sous $SDK_ROOT/cmdline-tools" >&2
            find "$SDK_ROOT" -maxdepth 4 -type d 2>/dev/null | head -50 || true
            exit 1
          fi
          echo "sdkmanager=$SDKM"

          LIC="$SDK_ROOT/licenses"
          mkdir -p "$LIC"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1" > "$LIC/android-sdk-license"
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$LIC/android-sdk-preview-license"
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" > "$LIC/android-sdk-arm-dbt-license"

          "$SDKM" --sdk_root="$SDK_ROOT" "platform-tools" "platforms;android-35"

          {
            echo "$(dirname "$SDKM")"
            echo "$SDK_ROOT/platform-tools"
          } >> "$GITHUB_PATH"

      - name: Verifier SDK
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          command -v sdkmanager
          ls -la "${ANDROID_SDK_ROOT}/platform-tools"
          ls -la "${ANDROID_SDK_ROOT}/platforms/android-35"

      - name: Android build-tools
        env:
          JAVA_HOME: ${{ steps.setup-jdk.outputs.path }}
        run: |
          set -euxo pipefail
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" "build-tools;35.0.0" "build-tools;34.0.0"
          ls -la "${ANDROID_SDK_ROOT}/build-tools"

      - name: Gradle cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/web/android/**/*.gradle*', 'apps/web/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install monorepo dependencies
        run: npm ci --no-fund --no-audit

      - name: Build shared + web
        run: |
          npm run build -w packages/shared
          npm run build -w apps/web

      - name: Capacitor sync
        run: npm run cap:sync -w apps/web

      - name: Gradle sdk.dir
        run: |
          test -n "${ANDROID_SDK_ROOT}"
          printf "sdk.dir=%s\n" "${ANDROID_SDK_ROOT}" > apps/web/android/local.properties
          cat apps/web/android/local.properties

      - name: Assemble debug APK
        working-directory: apps/web/android
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"
          JAVA_HOME: ${{ steps.setup-jdk.outputs.path }}
        run: |
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export JAVA_HOME="${JAVA_HOME}"
          echo "Gradle utilisera JAVA_HOME=${JAVA_HOME}"
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode all -Dorg.gradle.java.home="${JAVA_HOME}"

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: budget-famille-ajoub-debug
          path: apps/web/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # Lien public du type : .../releases/download/v0.1.0-debug-<run>/app-debug.apk
      - name: Publier une Release GitHub (APK partageable)
        if: ${{ github.event_name == 'push' || github.event.inputs.publier_release_github == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-debug-${{ github.run_number }}
          name: Budget Famille Ajoub — APK debug (#${{ github.run_number }})
          body: |
            APK **debug** généré automatiquement par GitHub Actions.

            Fichier joint : `app-debug.apk` (installez hors Play Store si demandé).
          files: apps/web/android/app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
