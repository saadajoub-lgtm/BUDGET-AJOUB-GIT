# APK Android (Capacitor) sans Expo : build dans le cloud GitHub Actions.
# Prérequis : dépôt sur GitHub (push ce fichier), puis Actions > ce workflow > Run workflow.
# Récupération : onglet Actions > run terminé > Artifacts > budget-famille-ajoub-debug.apk

name: Capacitor Android APK (debug)

on:
  workflow_dispatch:

concurrency:
  group: capacitor-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-debug-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # sdkmanager (setup-android, --licenses) exige JDK 17+ ; l'image runner expose souvent Java 11 par defaut.
      - name: JDK 21 (sdkmanager + Gradle)
        id: setup-jdk
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Verifier JDK pour sdkmanager
        run: |
          echo "JAVA_HOME=${JAVA_HOME}"
          java -version
          javac -version

      - name: Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      # Ne pas demander le paquet sdkmanager "tools" (obsolete / erreur sdkmanager).
      # v4 = runtime Node 24. JAVA_HOME explicite : certaines images ont Java 11 avant setup-java.
      - name: Android SDK (platform 35)
        uses: android-actions/setup-android@v4
        env:
          JAVA_HOME: ${{ steps.setup-jdk.outputs.path }}
        with:
          packages: "platform-tools platforms;android-35"

      - name: Verifier SDK
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          ls -la "${ANDROID_SDK_ROOT}/platform-tools" || true
          ls -la "${ANDROID_SDK_ROOT}/platforms/android-35" || true

      # AGP 8.x : installer les build-tools (sans "yes |" : avec pipefail, SIGPIPE -> code 141 -> echec CI).
      - name: Android build-tools
        env:
          JAVA_HOME: ${{ steps.setup-jdk.outputs.path }}
        run: |
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" "build-tools;35.0.0" "build-tools;34.0.0"
          ls -la "${ANDROID_SDK_ROOT}/build-tools" || true

      - name: Verifier Java avant Gradle
        run: |
          echo "JAVA_HOME=${JAVA_HOME}"
          java -version
          javac -version

      - name: Gradle cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/web/android/**/*.gradle*', 'apps/web/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install monorepo dependencies
        run: npm ci --no-fund --no-audit

      - name: Build shared + web
        run: |
          npm run build -w packages/shared
          npm run build -w apps/web

      - name: Capacitor sync
        run: npm run cap:sync -w apps/web

      - name: Gradle sdk.dir
        run: |
          test -n "${ANDROID_SDK_ROOT}"
          printf "sdk.dir=%s\n" "${ANDROID_SDK_ROOT}" > apps/web/android/local.properties
          cat apps/web/android/local.properties

      - name: Assemble debug APK
        working-directory: apps/web/android
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"
          JAVA_HOME: ${{ steps.setup-jdk.outputs.path }}
        run: |
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export JAVA_HOME="${JAVA_HOME}"
          echo "Gradle utilisera JAVA_HOME=${JAVA_HOME}"
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode all -Dorg.gradle.java.home="${JAVA_HOME}"

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: budget-famille-ajoub-debug
          path: apps/web/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
