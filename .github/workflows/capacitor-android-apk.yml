# APK Android (Capacitor) sans Expo : build dans le cloud GitHub Actions.
# Prérequis : dépôt sur GitHub (push ce fichier), puis Actions > ce workflow > Run workflow.
# Récupération : onglet Actions > run terminé > Artifacts > budget-famille-ajoub-debug.apk

name: Capacitor Android APK (debug)

on:
  workflow_dispatch:

concurrency:
  group: capacitor-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-debug-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      # Capacitor 7 compile avec source release 21 : JDK 17 provoque "invalid source release: 21".
      - name: JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      # Inclure tools + platform-tools. Plateforme 35 obligatoire ; build-tools souvent complete par AGP si version absente.
      - name: Android SDK (platform 35)
        uses: android-actions/setup-android@v4
        with:
          packages: "tools platform-tools platforms;android-35"

      - name: Verifier SDK
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          ls -la "${ANDROID_SDK_ROOT}/platform-tools" || true
          ls -la "${ANDROID_SDK_ROOT}/platforms/android-35" || true

      # AGP 8.x : installer les build-tools (sans "yes |" : avec pipefail, SIGPIPE -> code 141 -> echec CI).
      - name: Android build-tools
        run: |
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" "build-tools;35.0.0" "build-tools;34.0.0"
          ls -la "${ANDROID_SDK_ROOT}/build-tools" || true

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/web/android/**/*.gradle*', 'apps/web/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install monorepo dependencies
        run: npm ci --no-fund --no-audit

      - name: Build shared + web
        run: |
          npm run build -w packages/shared
          npm run build -w apps/web

      - name: Capacitor sync
        run: npm run cap:sync -w apps/web

      - name: Gradle sdk.dir
        run: |
          test -n "${ANDROID_SDK_ROOT}"
          printf "sdk.dir=%s\n" "${ANDROID_SDK_ROOT}" > apps/web/android/local.properties
          cat apps/web/android/local.properties

      - name: Assemble debug APK
        working-directory: apps/web/android
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"
        run: |
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode all

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: budget-famille-ajoub-debug
          path: apps/web/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
